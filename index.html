<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skincare Ritual</title>

<style>
/* SEU LAYOUT ORIGINAL MANTIDO */
body{
  font-family: Arial;
  background:#FAF5F2;
  margin:0;
}

.header{
  text-align:center;
  padding:20px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr); /* Ajustado para 4 colunas */
  background:#EDE0D8;
}

.tab{
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  font-weight:bold;
  color:#9C6B5A;
}

.content{
  display:none;
  padding:20px;
}

.content.active{
  display:block;
}

.step{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.step.done{
  text-decoration:line-through;
  opacity:0.6;
}

.reset{
  margin-top:10px;
  background: #E8D0C8;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

/* --- ADIÇÃO: ESTILO DA ABA CONFIG (BASEADO NAS FOTOS) --- */
.config-card {
    background: #F4EAE4;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
}

.config-title {
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 1px;
    color: #5C3D2E;
    margin-bottom: 15px;
    display: block;
}

.label-image {
    font-size: 11px;
    color: #C49A8A;
    margin-bottom: 5px;
    display: block;
    font-style: italic;
}

.input-image {
    width: 100%;
    background: #FCF8F6;
    border: 1px solid #EEDCD5;
    border-radius: 15px;
    padding: 10px 15px;
    margin-bottom: 15px;
    box-sizing: border-box;
    color: #5C3D2E;
}

.btn-salvar {
    background: #9C6B5A;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 20px;
    cursor: pointer;
    display: block;
    margin: 10px auto;
}
</style>
</head>

<body>

<div class="header">
<h2 id="tituloPrincipal">Skincare Ritual</h2>
<p id="subtituloRitual" style="font-size: 13px; color: #8C6F61;">Banho ~12h · rápida antes de sair ✨</p>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('manha',this)">☀️ Manhã</div>
<div class="tab" onclick="showTab('noite',this)">🌙 Noite</div>
<div class="tab" onclick="showTab('virilha',this)">✿ Virilha</div>
<div class="tab" onclick="showTab('config',this)">⚙️ Config</div>
</div>

<div class="content active" id="tab-manha">
<div class="step" onclick="toggle(this,'manha',0)">Limpeza do rosto</div>
<div class="step" onclick="toggle(this,'manha',1)">Gel anti-oleosidade</div>
<div class="step" onclick="toggle(this,'manha',2)">Sérum</div>
<div class="step" onclick="toggle(this,'manha',3)">Protetor solar</div>
<button class="reset" onclick="resetTab('manha')">Resetar</button>
</div>

<div class="content" id="tab-noite">
<div class="step" onclick="toggle(this,'noite',0)">Remover maquiagem</div>
<div class="step" onclick="toggle(this,'noite',1)">Limpeza</div>
<div class="step" onclick="toggle(this,'noite',2)">Hidratante</div>
<button class="reset" onclick="resetTab('noite')">Resetar</button>
</div>

<div class="content" id="tab-virilha">
<div class="step" onclick="toggle(this,'virilha',0)">Sabonete</div>
<div class="step" onclick="toggle(this,'virilha',1)">Gel</div>
<div class="step" onclick="toggle(this,'virilha',2)">Sérum</div>
<button class="reset" onclick="resetTab('virilha')">Resetar</button>
</div>

<div class="content" id="tab-config">
    <div class="config-card">
        <span class="config-title">⏰ HORÁRIOS</span>
        
        <label class="label-image">Manhã – horário / nota</label>
        <input type="text" id="cfg_horario" class="input-image" placeholder="Banho ~12h · rápida antes de sair ✨">
        
        <label class="label-image">Noite AF – nota</label>
        <input type="text" id="cfg_noite_af" class="input-image" placeholder="⚡ 1 dia sim · 1 dia não">
    </div>

    <div class="config-card">
        <span class="config-title">☀️ MANHÃ</span>
        <label class="label-image">Passo 1 – título</label>
        <input type="text" id="cfg_p1t" class="input-image" value="Limpeza no banho">
    </div>

    <button class="btn-salvar" onclick="salvarConfig()">✓ Salvar configurações</button>
</div>

<script>
// SUAS FUNÇÕES ORIGINAIS MANTIDAS
function showTab(id, el){
    document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    el.classList.add('active');
}

function toggle(el, tabId, index){
    el.classList.toggle('done');
    const key = tabId + '-' + index;
    if(el.classList.contains('done')){
        localStorage.setItem(key, 'true');
    }else{
        localStorage.removeItem(key);
    }
}

function carregar(){
    // Carregar passos riscados
    document.querySelectorAll('.content').forEach(tab=>{
        const tabId = tab.id.replace('tab-','');
        tab.querySelectorAll('.step').forEach((step,index)=>{
            const key = tabId + '-' + index;
            if(localStorage.getItem(key)){
                step.classList.add('done');
            }
        });
    });

    // Carregar textos da configuração
    if(localStorage.getItem('cfg_horario')){
        document.getElementById('subtituloRitual').innerText = localStorage.getItem('cfg_horario');
        document.getElementById('cfg_horario').value = localStorage.getItem('cfg_horario');
    }
}

function resetTab(tabId){
    const tab = document.getElementById('tab-'+tabId);
    tab.querySelectorAll('.step').forEach((step,index)=>{
        step.classList.remove('done');
        localStorage.removeItem(tabId+'-'+index);
    });
}

// NOVA FUNÇÃO PARA SALVAR CONFIGS
function salvarConfig(){
    const novoSubtitulo = document.getElementById('cfg_horario').value;
    localStorage.setItem('cfg_horario', novoSubtitulo);
    document.getElementById('subtituloRitual').innerText = novoSubtitulo;
    alert("Salvo!");
}

window.onload = carregar;
</script>

</body>
</html>
