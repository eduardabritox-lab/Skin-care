<style>
  :root {
    --terracota: #9C6B5A;
    --terracota-med: #C49A8A;
    --terracota-clr: #E8D0C8;
    --bege-rosa: #F2E8E3;
    --bege-quente: #EDE0D8;
    --bege-suave: #FAF5F2;
    --marrom-escuro: #5C3D2E;
    --marrom-medio: #8B6355;
    --marrom-claro: #C4A99A;
    --vermelho: #8B3A2A;
    --branco: #FFFCFA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bege-suave);
    font-family: 'Lora', serif;
    color: var(--marrom-escuro);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  .header {
    background: linear-gradient(160deg, var(--bege-quente) 0%, var(--terracota-clr) 100%);
    padding: 32px 20px 24px;
    text-align: center;
  }

  .orn {
    font-family: 'Cormorant Garamond', serif;
    color: var(--terracota-med);
    font-size: 16px;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--marrom-escuro);
    letter-spacing: 2px;
  }

  .header p {
    font-style: italic;
    font-size: 12px;
    color: var(--terracota);
    margin-top: 8px;
  }

  .header-line {
    width: 60px;
    height: 1px;
    background: var(--terracota-med);
    margin: 12px auto;
  }

  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--bege-quente);
    border-bottom: 2px solid var(--terracota-clr);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tabs-row2 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--bege-quente);
    border-bottom: 2px solid var(--terracota-clr);
    position: sticky;
    top: 48px;
    z-index: 99;
  }

  .tab {
    padding: 11px 4px;
    font-family: 'Lora', serif;
    font-size: 10px;
    color: var(--marrom-claro);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    text-align: center;
    border-right: 1px solid var(--terracota-clr);
    transition: 0.3s;
  }

  .tab.active {
    color: var(--terracota);
    border-bottom-color: var(--terracota);
    background: var(--bege-suave);
    font-weight: 600;
  }

  .content {
    display: none;
    padding: 20px 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  .content.active {
    display: block;
  }

  .step {
    background: var(--branco);
    border-radius: 14px;
    padding: 15px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--terracota-clr);
    cursor: pointer;
    transition: 0.3s;
  }

  .step.done {
    background: var(--bege-rosa);
  }

  .step-title {
    font-size: 13.5px;
    font-weight: 600;
  }

  .step-desc {
    font-size: 11.5px;
    color: var(--marrom-claro);
    font-style: italic;
  }

  .aviso {
    background: #F9EDE8;
    border: 1px solid var(--vermelho);
    border-radius: 12px;
    padding: 12px;
    font-size: 12px;
    color: var(--vermelho);
    text-align: center;
  }

  .destaque {
    background: var(--bege-suave);
    border: 1px solid var(--terracota-clr);
    border-radius: 12px;
    padding: 11px;
    font-size: 12px;
    color: var(--terracota);
    text-align: center;
  }
</style>
